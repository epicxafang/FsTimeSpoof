name: Build

on:
  push:
    branches: [main]
    paths:
      - 'FsTimeSpoof.c'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout FsTimeSpoof
        uses: actions/checkout@v5

      - name: Checkout KernelPatch (headers only)
        uses: actions/checkout@v5
        with:
          repository: bmax121/KernelPatch
          path: KernelPatch
          sparse-checkout: |
            kernel/include/
            kernel/patch/include/
            kernel/linux/include/
            kernel/linux/arch/arm64/include/
            kernel/linux/tools/arch/arm64/include/

      - name: Checkout toolchain
        uses: actions/checkout@v5
        with:
          repository: epicxafang/kp-toolchain
          path: toolchain

      - name: Build
        env:
          TARGET_COMPILE: ${{ github.workspace }}/toolchain/bin/aarch64-none-elf-
          KP_DIR: ${{ github.workspace }}/KernelPatch
        run: make clean && make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FsTimeSpoof
          path: FsTimeSpoof.kpm
          retention-days: 30
